name: Deploy KorbanMBG

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'api/**'
      - 'daily_scraper.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          port: 22
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="/usr/bin:$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"

            cd /home/ubuntu/projects/korbanmbg

            git fetch origin
            git reset --hard origin/master

            # Build API (Go)
            cd api
            go build -o korbanmbg-api .
            cd ..

            # Build Frontend (SvelteKit)
            cd web
            npm install --production=false
            npm run build
            cd ..

            # Restart services
            pm2 restart korbanmbg-api korbanmbg-web
            pm2 save

            echo "Deploy complete: $(date)"
